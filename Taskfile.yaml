version: '3'

vars:
  GO_VERSION: '1.26.0'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GCI_VERSION: 'v0.14.0'
  GOFUMPT_VERSION: 'v0.10.0'
  BUF_VERSION: '1.69.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'
  OGEN_VERSION: 'v1.20.3'
  MOCKERY_VERSION: 'v3.7.0'
  GOOSE_VERSION: 'v3.27.1'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'
  BUF: '{{.BIN_DIR}}/buf'
  PROTOC_GEN_GO: '{{.BIN_DIR}}/protoc-gen-go'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc'
  OGEN: '{{.BIN_DIR}}/ogen'
  MOCKERY: '{{.BIN_DIR}}/mockery'
  COVERAGE_DIR: '{{.ROOT_DIR}}/coverage'
  COVERAGE_FILE: '{{.COVERAGE_DIR}}/coverage.out'
  COVERAGE_THRESHOLD: '95'
  GOOSE: '{{.BIN_DIR}}/goose'

  MODULES: order inventory payment

tasks:
  formatters:install:
    desc: "Устанавливает gofumpt и gci"
    cmds:
      - echo '📦 Устанавливаем gofumpt...'
      - GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
      - echo '📦 Устанавливаем gci...'
      - GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  golangci-lint:install:
    desc: "Устанавливает golangci-lint"
    cmds:
      - echo '📦 Устанавливаем golangci-lint...'
      - GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    status:
      - test -x {{.GOLANGCI_LINT}}

  buf:install:
    desc: "Устанавливает buf"
    cmds:
      - echo '📦 Устанавливаем buf...'
      - GOBIN={{.BIN_DIR}} go install github.com/bufbuild/buf/cmd/buf@v{{.BUF_VERSION}}
    status:
      - test -x {{.BUF}}

  proto:install-plugins:
    desc: "Устанавливает protoc-плагины"
    cmds:
      - echo '📦 Устанавливаем protoc-gen-go...'
      - GOBIN={{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
      - echo '📦 Устанавливаем protoc-gen-go-grpc...'
      - GOBIN={{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
    status:
      - test -x {{.PROTOC_GEN_GO}}
      - test -x {{.PROTOC_GEN_GO_GRPC}}

  ogen:install:
    desc: "Устанавливает ogen"
    cmds:
      - echo '📦 Устанавливаем ogen...'
      - GOBIN={{.BIN_DIR}} go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
    status:
      - test -x {{.OGEN}}

  setup:
    desc: "Устанавливает все инструменты"
    deps: [formatters:install, golangci-lint:install, buf:install, proto:install-plugins, ogen:install]

  format:
    desc: "Форматирует код (gofumpt + gci)"
    deps: [formatters:install]
    cmds:
      - echo '🧹 Форматируем код через gofumpt...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' ! -path '*/pkg/proto/*' ! -path '*/pkg/openapi/*' -exec {{.GOFUMPT}} -extra -w {} +
      - echo '📦 Сортируем импорты через gci...'
      # TODO: Поменяй prefix на свой модуль
      - find . -type f -name '*.go' ! -path '*/mocks/*' ! -path '*/pkg/proto/*' ! -path '*/pkg/openapi/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/krapagen/my_microservices_rocket)" {} +

  build:
    desc: "Собирает все Go-модули (go build)"
    cmds:
      - go build ./order/... ./inventory/... ./payment/...

  lint:
    desc: "Запускает golangci-lint"
    deps: [golangci-lint:install]
    cmds:
      - '{{.GOLANGCI_LINT}} run --allow-parallel-runners order/... inventory/... payment/... --config=.golangci.yml'

  proto:format:
    desc: "Форматирует .proto-файлы (buf format)"
    deps: [buf:install]
    dir: shared/proto
    cmds:
      - echo '🧹 Форматируем .proto-файлы...'
      - '{{.BUF}} format -w'

  proto:lint:
    desc: "Проверяет .proto-файлы линтером"
    deps: [buf:install, proto:install-plugins, proto:format]
    dir: shared/proto
    cmds:
      - echo '🔍 Проверяем .proto-файлы...'
      - '{{.BUF}} lint'

  proto:gen:
    desc: "Генерирует Go-код из .proto"
    deps: [buf:install, proto:install-plugins, proto:format]
    dir: shared/proto
    cmds:
      - echo '🔨 Генерируем Go-код из .proto...'
      - '{{.BUF}} generate'

  ogen:gen:
    desc: "Генерирует Go-код из OpenAPI"
    deps: [ogen:install]
    dir: shared
    cmds:
      - echo '🔨 Генерируем Go-код из OpenAPI...'
      - '{{.OGEN}} -target ./pkg/openapi/order/v1 -package orderv1 -clean ./api/order/v1/order.openapi.yaml 2>/dev/null'

  gen:
    desc: "Генерирует весь код"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  deps:update:
    desc: "Обновляет зависимости"
    cmds:
      - echo '🔄 Синхронизируем go.work...'
      - go work sync
      - echo '🔄 Обновляем зависимости в сервисах...'
      - for: { var: MODULES }
        cmd: cd {{.ITEM}} && go mod tidy -compat={{.GO_VERSION}}
      - echo '🔄 Обновляем зависимости в shared (proto/openapi)...'
      - cd shared && go mod tidy -compat={{.GO_VERSION}}

  run:inventory:
    desc: "Запускает InventoryService (gRPC :50051)"
    dir: inventory
    cmds:
      - go run ./cmd

  run:payment:
    desc: "Запускает PaymentService (gRPC :50052)"
    dir: payment
    cmds:
      - go run ./cmd

  run:order:
    desc: "Запускает OrderService (HTTP :8080)"
    dir: order
    cmds:
      - go run ./cmd

  test:api:
    desc: "Запускает API-тесты"
    cmds:
      - go test -v ./order/tests/...

  mockery:install:
    desc: "Устанавливает mockery"
    cmds:
      - echo '📦 Устанавливаем mockery...'
      - GOBIN={{.BIN_DIR}} go install github.com/vektra/mockery/v3@{{.MOCKERY_VERSION}}
    status:
      - test -x {{.MOCKERY}}

  mocks:gen:
    desc: "Генерирует моки интерфейсов"
    deps: [ mockery:install ]
    cmds:
      - echo '🧪 Генерация моков...'
      - '{{.MOCKERY}}'
  test:
    desc: "Запускает unit-тесты с race-детектором"
    cmds:
      - |
        for mod in order inventory payment; do
          echo "=== $mod ==="
          (cd "$mod" && go test -v -race -count=1 $(go list ./... | grep -E '/(api|service)/.*tests?$' | grep -v '/mocks'))
        done

  coverage:clean:
    desc: "Очищает директорию с отчётами покрытия"
    internal: true
    cmds:
      - rm -rf {{.COVERAGE_DIR}}
      - mkdir -p {{.COVERAGE_DIR}}

  test:coverage:
    desc: "Тесты с покрытием бизнес-логики"
    deps: [coverage:clean]
    cmds:
      - |
        for mod in order inventory payment; do
          echo "=== $mod ==="
          (
            cd "$mod"
            target_packages=$(go list ./... | grep -v "/mocks" | grep -E '/(api|service)/' | grep -Ev '/tests?$' | tr '\n' ',' | sed 's/,$//')
            if [ -z "$target_packages" ]; then
              echo "Не найдено пакетов для тестирования в $mod"
              exit 1
            fi
            echo "📦 Целевые пакеты: $target_packages"
            go test -v -race -covermode=atomic -coverprofile={{.COVERAGE_DIR}}/${mod}.out -coverpkg="$target_packages" $(go list ./... | grep -E '/(api|service|repository)/.*tests?$' | grep -v '/mocks')
          )
        done
      - echo "📊 Объединяем отчёты покрытия..."
      - |
        head -1 {{.COVERAGE_DIR}}/order.out > {{.COVERAGE_FILE}}
        for f in {{.COVERAGE_DIR}}/order.out {{.COVERAGE_DIR}}/inventory.out {{.COVERAGE_DIR}}/payment.out; do
          tail -n +2 "$f" >> {{.COVERAGE_FILE}}
        done
      - echo "📊 Покрытие по функциям:"
      - go tool cover -func={{.COVERAGE_FILE}}
      - task: coverage:threshold

  coverage:threshold:
    desc: "Проверяет соответствие покрытия порогу"
    internal: true
    vars:
      COVERAGE:
        sh: go tool cover -func={{.COVERAGE_FILE}} | tail -n1 | awk '{print $NF}' | tr -d '%'
    preconditions:
      - sh: test -f {{.COVERAGE_FILE}}
        msg: "Файл покрытия не найден. Запустите task test:coverage"
    cmds:
      - echo "🧾 Общее покрытие:{{.COVERAGE}}% | Порог:{{.COVERAGE_THRESHOLD}}%"
      - cmd: test $(echo "{{.COVERAGE}} >= {{.COVERAGE_THRESHOLD}}" | bc) -eq 1
      - echo "✅ Покрытие соответствует порогу"

  coverage:html:
    desc: "Генерирует HTML-отчёт покрытия"
    deps: [test:coverage]
    vars:
      HTML_FILE: '{{.COVERAGE_DIR}}/coverage.html'
    cmds:
      - go tool cover -html={{.COVERAGE_FILE}} -o {{.HTML_FILE}}
      - echo "🌐 Отчёт сохранён в {{.HTML_FILE}}"
      - cmd: open {{.HTML_FILE}}
        platforms: [darwin]
      - cmd: xdg-open {{.HTML_FILE}}
        platforms: [linux]
      - cmd: start {{.HTML_FILE}}
        platforms: [windows]

  coverage:check:
    desc: "Проверяет покрытие без запуска тестов"
    cmds:
      - task: coverage:threshold

  goose:install:
    desc: "Устанавливает goose (миграции БД)"
    cmds:
      - echo '📦 Устанавливаем goose...'
      - GOBIN={{.BIN_DIR}} go install github.com/pressly/goose/v3/cmd/goose@{{.GOOSE_VERSION}}
    status:
      - test -x {{.GOOSE}}

  up-core:
    desc: "Создать общую сеть для микросервисов"
    cmds:
      - echo '[task] 🌐 Создаём общую сеть microservices-net'
      - docker network rm microservices-net 2>/dev/null || true
      - docker network create microservices-net 2>/dev/null || true

  down-core:
    desc: "Удалить общую сеть микросервисов"
    cmds:
      - echo '[task] 🛑 Удаляем общую сеть microservices-net'
      - docker network rm microservices-net 2>/dev/null || true

  up-order:
    desc: Поднять Order сервис и все его зависимости
    dir: deploy/compose/order
    cmds:
      - echo "[task] 📦 Поднимаем Order с зависимостями"
      - docker compose --env-file ../../../order.env up --build --detach

  down-order:
    desc: Остановить и удалить Order сервис и все его зависимости
    dir: deploy/compose/order
    cmds:
      - echo "[task] 🛑 Останавливаем Order с зависимостями"
      - docker compose --env-file ../../../order.env down --volumes

  up-inventory:
    desc: Поднять Inventory сервис и все его зависимости
    dir: deploy/compose/inventory
    cmds:
      - echo "[task] 📦 Поднимаем Inventory с зависимостями"
      - docker compose --env-file ../../../inventory.env up --build --detach

  down-inventory:
    desc: Остановить и удалить Inventory сервис и все его зависимости
    dir: deploy/compose/inventory
    cmds:
      - echo "[task] 🛑 Останавливаем Inventory с зависимостями"
      - docker compose --env-file ../../../inventory.env down --volumes

  up-all:
    desc: Поднять все сервисы по очереди вместе с зависимостями
    cmds:
      - task up-core
      - task up-inventory
      - task up-order

  down-all:
    desc: Остановить и удалить все сервисы по очереди вместе с зависимостями
    cmds:
      - task down-order
      - task down-inventory
      - task down-core

  migrate:order:up:
    desc: "Применяет все миграции Order-сервиса"
    deps: [ goose:install ]
    dotenv: [ 'order.env' ]
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" up'

  migrate:order:down:
    desc: "Откатывает последнюю миграцию Order-сервиса"
    deps: [ goose:install ]
    dotenv: [ 'order.env' ]
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" down'

  migrate:order:status:
    desc: "Показывает статус миграций Order-сервиса"
    deps: [ goose:install ]
    dotenv: [ 'order.env' ]
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" status'

  migrate:inventory:up:
    desc: "Применяет все миграции Inventory-сервиса"
    deps: [ goose:install ]
    dotenv: [ 'inventory.env' ]
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" up'

  migrate:inventory:down:
    desc: "Откатывает последнюю миграцию Inventory-сервиса"
    deps: [ goose:install ]
    dotenv: [ 'inventory.env' ]
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" down'

  migrate:inventory:status:
    desc: "Показывает статус миграций Inventory-сервиса"
    deps: [ goose:install ]
    dotenv: [ 'inventory.env' ]
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" status'
