services: # Здесь описываются контейнеры, необходимые для Inventory-сервиса

  postgres-inventory: # Контейнер с PostgreSQL — используется для хранения данных об инвентаре (детали, компоненты)
    image: ${POSTGRES_IMAGE}
    # Используем официальный образ PostgreSQL на базе Alpine Linux

    container_name: postgres-inventory
    # Устанавливаем удобное читаемое имя контейнера — пригодится для логов и отладки

    env_file:
      - ../../../inventory.env
      # Загружаем переменные окружения из файла inventory.env в корне workspace
      # Это позволяет переиспользовать одни и те же переменные в docker-compose, Taskfile и тестах

    volumes:
      - postgres_inventory_data:/var/lib/postgresql
      # Подключаем локальный Docker-том к директории PostgreSQL, где хранятся все данные (таблицы, индексы и т.д.)
      # Это нужно для сохранения данных между перезапусками контейнера

    ports:
      - "${POSTGRES_PORT}:5432"
      # Пробрасываем внутренний порт PostgreSQL (5432) наружу на порт из inventory.env (POSTGRES_PORT=5433)
      # Порт 5433, чтобы не конфликтовать с PostgreSQL для OrderService (порт 5432)

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      # Проверка готовности PostgreSQL: выполняем pg_isready для проверки доступности базы
      interval: 10s # Запускаем проверку каждые 10 секунд
      timeout: 5s # Максимальное время ожидания выполнения проверки
      retries: 5 # После 5 неудачных проверок подряд контейнер считается "неработоспособным"

    restart: unless-stopped
    # Автоматически перезапускаем контейнер, если он аварийно завершился
    # Но если мы остановим его вручную — он не запустится повторно

    networks:
      - microservices-net
      # Подключаем контейнер к общей сети всех микросервисов, чтобы они могли взаимодействовать между собой по имени

volumes: # Раздел с томами — определяем хранилище, которое создаст Docker
  postgres_inventory_data:
  # Именованный том, в котором будут храниться данные PostgreSQL для Inventory-сервиса
  # Он живёт отдельно от контейнера и сохраняется даже после удаления контейнера

networks: # Определение используемой сети
  microservices-net:
    external: true
    # Мы не создаём новую сеть, а подключаемся к внешней, общей для всех микросервисов
    # Её создаёт task up-core (docker network create microservices-net)
