# Конфигурация mockery v3.
# Документация: https://vektra.github.io/mockery/latest/configuration/

# Шаблон testify с expecter API.
template: testify

# Форматирование сгенерированного кода.
formatter: goimports

# Директория для сгенерированных моков (рядом с интерфейсом в подпапке mocks).
dir: "{{.InterfaceDir}}/mocks"

# Имя файла мока (snake_case через функцию snakecase).
filename: "mock_{{ .InterfaceName | snakecase }}.go"

# Имя пакета моков.
pkgname: "mocks"

# Имя структуры мока (совпадает с именем интерфейса).
structname: "{{.InterfaceName}}"

# Принудительная перезапись существующих файлов.
force-file-write: true

# Boilerplate текст (лицензия, заголовок).
template-data:
  boilerplate-file: ".mockery_boilerplate_text.txt"

packages:
  # Order service
  github.com/krapagen/my_microservices_rocket/order/internal/api/order/v1:
    config:
      include-interface-regex: ".*Service"
  github.com/krapagen/my_microservices_rocket/order/internal/service/order:
    config:
      include-interface-regex: ".*(Repository|Client|TxManager)"

  # Inventory service
  github.com/krapagen/my_microservices_rocket/inventory/internal/api/inventory/v1:
    config:
      include-interface-regex: ".*Service"
  github.com/krapagen/my_microservices_rocket/inventory/internal/service/application/part:
    config:
      include-interface-regex: ".*(Repository|Checker|TxManager)"

  # Payment service
  github.com/krapagen/my_microservices_rocket/payment/internal/api/payment/v1:
    config:
      include-interface-regex: ".*Service"
