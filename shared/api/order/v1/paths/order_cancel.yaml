post:
  summary: Отменить заказ
  description: Отменяет заказ, который ещё не был оплачен
  operationId: cancelOrder
  tags:
    - Orders
  parameters:
    - $ref: '../params/order_uuid.yaml'
  responses:
    '200':
      description: Заказ успешно отменён
      content:
        application/json:
          schema:
            $ref: '../components/cancel_order_response.yaml'
    '400':
      $ref: '../components/responses/bad_request.yaml'
    '404':
      $ref: '../components/responses/order_not_found.yaml'
    '409':
      $ref: '../components/responses/order_already_paid.yaml'
    '500':
      $ref: '../components/responses/internal_server_error.yaml'
