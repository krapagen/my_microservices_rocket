syntax = "proto3";

package inventory.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/krapagen/my_microservices_rocket/shared/pkg/proto/inventory/v1;inventoryv1";

// InventoryService управляет каталогом деталей для космических кораблей
service InventoryService {
  // GetPart возвращает деталь по UUID
  rpc GetPart(GetPartRequest) returns (GetPartResponse);

  // Возвращает список деталей с возможностью фильтрации по типу или по конкретным UUID
  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
}

// Тип детали
enum PartType {
  PART_TYPE_UNSPECIFIED = 0;
  PART_TYPE_HULL = 1;
  PART_TYPE_ENGINE = 2;
  PART_TYPE_SHIELD = 3;
  PART_TYPE_WEAPON = 4;
}

// Part представляет деталь космического корабля
message Part {
  // Уникальный идентификатор детали
  string uuid = 1;

  // Название детали
  string name = 2;

  // Описание детали
  string description = 3;

  // Цена в копейках (5000₽ = 500000)
  int64 price = 4;

  // Тип детали (enum)
  PartType part_type = 5;

  // Количество деталей на складе
  int64 stock_quantity = 6;

  // Дата создания детали
  google.protobuf.Timestamp created_at = 7;
}

// Запрос на получение детали по UUID
message GetPartRequest {
  string uuid = 1;
}

// Ответ на запрос GetPart(информация о детали)
message GetPartResponse {
  Part part = 1;
}

// Запрос на получение списка деталей c фильтром по типу и/или UUID
message ListPartsRequest {
  //Фильтр по типу (UNSPECIFIED = все детали)
  PartType part_type = 1;
  // Опционально: конкретные UUID (приоритет над part_type)
  repeated string uuids = 2;
}

// Список деталей, соответствующих фильтру
message ListPartsResponse {
  repeated Part parts = 1;
}
