name: "Test API"

on:
  workflow_call:

jobs:
  test-api:
    name: "API tests"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.0'
          cache-dependency-path: '**/go.sum'

      - name: Cache task-installed binaries
        uses: actions/cache@v5.0.5
        with:
          path: bin
          key: ${{ runner.os }}-task-bin-${{ hashFiles('Taskfile.yaml') }}
          restore-keys: |
            ${{ runner.os }}-task-bin-

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@v3.50.0

      - name: Run API tests
        run: task test:api
